<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Session ID Copier (v1.3.3)</title>
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1d2e;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    h2 {
      margin: 0;
      font-size: 14px;
      text-transform: uppercase;
      color: #9da8ff;
      letter-spacing: 1px;
    }

    .session-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(99, 130, 255, 0.4);
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      margin-bottom: 20px;
    }

    .session-text {
      font-family: monospace;
      font-size: 15px;
      font-weight: 700;
      word-break: break-all;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #5865f2;
      color: white;
      font-weight: 800;
      cursor: pointer;
      font-size: 14px;
    }

    button:disabled {
      background: #3c4250;
      color: #72767d;
      cursor: not-allowed;
    }

    .status {
      margin-top: 15px;
      font-size: 12px;
      color: #ff6b6b;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="header"><span>🔗</span>
    <h2>Session ID</h2>
  </div>
  <div class="session-box">
    <div class="session-text" id="sessionText">-</div>
  </div>
  <button id="copyBtn" disabled>Copy</button>
  <div class="status" id="statusMsg"></div>
  <script src="popup.js"></script>
</body>

</html>
