<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Session ID Copier (v1.4.0)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@600&display=swap" rel="stylesheet">
  <style>
    body {
      width: 340px;
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      margin: 0;
      padding: 24px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .header-icon {
      font-size: 24px;
      background: linear-gradient(135deg, #5865f2 0%, #4752c4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      color: #94a3b8;
      letter-spacing: 2px;
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 1px;
      margin-bottom: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .card-inner {
      background: #1e293b;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
    }

    .session-text {
      font-family: 'Roboto Mono', monospace;
      font-size: 16px;
      font-weight: 600;
      color: #f8fafc;
      word-break: break-all;
      margin-bottom: 0;
      min-height: 24px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #5865f2 0%, #4752c4 100%);
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(88, 101, 242, 0.4);
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(88, 101, 242, 0.5);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
      box-shadow: none;
    }

    .status {
      margin-top: 16px;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      line-height: 1.6;
    }

    .error {
      color: #fb7185;
    }

    .success {
      color: #34d399;
    }
  </style>
</head>

<body>
  <div class="header">
    <span class="header-icon">⚡</span>
    <h2>Session ID</h2>
  </div>
  
  <div class="card">
    <div class="card-inner">
      <div class="session-text" id="sessionText">-</div>
    </div>
  </div>

  <button id="copyBtn" disabled>Copy Session ID</button>
  
  <div class="status" id="statusMsg"></div>
  
  <script src="popup.js"></script>
</body>

</html>
